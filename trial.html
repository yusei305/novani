<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>無料トライアル申込フォーム | NoVanityFit</title>
  <style>
  /* NoVanityFit デザインに合わせたベーススタイル */
  body {
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
    background-color: #0a0a0a;
    color: #f5f5f5;
    line-height: 1.6;
    margin: 0;
    padding: 0;
  }
  .legal-container {
    max-width: 800px;
    margin: 0 auto;
    padding: 40px 20px;
  }
  .legal-container h1 {
    font-size: 28px;
    font-weight: bold;
    margin-bottom: 30px;
    text-align: center;
    border-bottom: 1px solid #333;
    padding-bottom: 10px;
  }
  .legal-container h2 {
    font-size: 20px;
    font-weight: bold;
    margin-top: 40px;
    margin-bottom: 15px;
    color: #e0e0e0;
  }
  .legal-container p {
    margin-bottom: 15px;
    color: #cccccc;
  }
  .legal-container ul {
    margin-bottom: 20px;
    padding-left: 20px;
    color: #cccccc;
  }
  .legal-container li {
    margin-bottom: 8px;
  }
  .legal-container dl {
    width: 100%;
    border-top: 1px solid #333;
  }
  .legal-container dt {
    font-weight: bold;
    padding: 15px 0 5px;
    color: #e0e0e0;
  }
  .legal-container dd {
    margin: 0;
    padding: 0 0 15px;
    border-bottom: 1px solid #333;
    color: #cccccc;
  }
  .back-link {
    display: inline-block;
    margin-top: 40px;
    color: #ffffff;
    text-decoration: none;
    border: 1px solid #ffffff;
    padding: 10px 20px;
    border-radius: 4px;
    transition: all 0.3s ease;
  }
  .back-link:hover {
    background-color: #ffffff;
    color: #000000;
  }

  /* フォーム用スタイル */
  .custom-form {
    display: flex;
    flex-direction: column;
    gap: 24px;
    max-width: 600px;
    margin: 0 auto;
    background-color: #111;
    padding: 40px;
    border-radius: 8px;
    border: 1px solid #333;
  }
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .form-group label {
    font-weight: bold;
    color: #e0e0e0;
    font-size: 14px;
  }
  .form-group .required {
    color: #ff4444;
    margin-left: 4px;
  }
  .form-group input, 
  .form-group select, 
  .form-group textarea {
    background-color: #1a1a1a;
    border: 1px solid #444;
    color: #fff;
    padding: 14px 16px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 16px;
    transition: border-color 0.3s;
  }
  .form-group input:focus, 
  .form-group select:focus, 
  .form-group textarea:focus {
    outline: none;
    border-color: #fff;
  }
  .submit-btn {
    background-color: #fff;
    color: #000;
    border: none;
    padding: 16px;
    font-size: 16px;
    font-weight: bold;
    border-radius: 4px;
    cursor: pointer;
    transition: background-color 0.3s;
    margin-top: 10px;
  }
  .submit-btn:hover {
    background-color: #e0e0e0;
  }
  @media (max-width: 600px) {
    .custom-form {
      padding: 20px;
    }
  }
</style>
</head>
<body>
<div class="legal-container">
  <h1>2 Weeks Free Trial 申し込み</h1>
  <p style="text-align: center; margin-bottom: 40px;">
    以下のフォームに必要事項をご記入の上、送信してください。<br>
    内容を確認次第、担当者よりご連絡いたします。
  </p>
  
  <div style="display: flex; justify-content: center; width: 100%;">
    <iframe 
      src="https://docs.google.com/forms/d/e/1FAIpQLSe2hV4fzzUH0Ei4KB9taK2n12_DC2yEt-z1rfLkG_KjEfIcWA/viewform?embedded=true" 
      width="640" 
      height="800" 
      frameborder="0" 
      marginheight="0" 
      marginwidth="0"
      style="max-width: 100%; border-radius: 8px; background-color: #ffffff;"
    >
      読み込んでいます…
    </iframe>
  </div>
  
  <div style="text-align: center; margin-top: 40px;">
    <a href="index.html" class="back-link">トップページに戻る</a>
  </div>
</div>
</body>
</html>
